databases:
  - name: whatsapp-db
    plan: free
    databaseName: whatsapp_core
    user: whatsapp

services:
  - type: web
    name: whatsapp-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-db
          property: connectionString
      - key: APP_ORIGIN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
